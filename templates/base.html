{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Subscription Intelligence{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}?v=3">
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-sand text-ink antialiased {% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    <script>
        document.body.addEventListener("htmx:afterSwap", function (event) {
            const target = event.detail && event.detail.target;
            if (!target || !target.querySelector) {
                return;
            }

            const focusTarget = target.matches("[data-htmx-focus-target]")
                ? target
                : target.querySelector("[data-htmx-focus-target]");

            if (focusTarget) {
                requestAnimationFrame(function () {
                    focusTarget.focus({ preventScroll: true });
                });
            }
        });
    </script>
    {% if request.user.is_authenticated %}
    <script>
        (function () {
            var internalNavigation = false;

            function sameOrigin(url) {
                try {
                    return new URL(url, window.location.href).origin === window.location.origin;
                } catch (error) {
                    return false;
                }
            }

            function csrfToken() {
                var match = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
                return match ? decodeURIComponent(match[1]) : "";
            }

            document.addEventListener("click", function (event) {
                var link = event.target.closest && event.target.closest("a[href]");
                if (!link || link.target === "_blank" || link.hasAttribute("download")) {
                    return;
                }
                internalNavigation = sameOrigin(link.href);
            });

            document.addEventListener("submit", function (event) {
                var form = event.target;
                if (!form || !form.action) {
                    return;
                }
                internalNavigation = sameOrigin(form.action);
            });

            window.addEventListener("beforeunload", function () {
                if (internalNavigation) {
                    return;
                }
                fetch("{% url 'accounts:browser_session_closed' %}", {
                    method: "POST",
                    credentials: "same-origin",
                    keepalive: true,
                    headers: {
                        "X-CSRFToken": csrfToken()
                    }
                });
            });
        })();
    </script>
    {% endif %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
